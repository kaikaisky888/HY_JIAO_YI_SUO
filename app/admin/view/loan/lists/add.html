<div class="layuimini-container">
    <form id="app-form" class="layui-form layuimini-form">

        <div class="layui-form-item">
            <label class="layui-form-label">最小贷款金额</label>
            <div class="layui-input-block">
                <input type="text" name="min_amount" class="layui-input" lay-verify="required" placeholder="请输入最小贷款金额" value="0.0000">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">最大贷款金额</label>
            <div class="layui-input-block">
                <input type="text" name="max_amount" class="layui-input" lay-verify="required" placeholder="请输入最大贷款金额" value="0.0000">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">年化利率(%)</label>
            <div class="layui-input-block">
                <input type="text" name="interest_rate" class="layui-input" lay-verify="required" placeholder="请输入年化利率" value="0.0000">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">还款周期(天)</label>
            <div class="layui-input-block">
                <input type="text" name="repayment_period" class="layui-input" lay-verify="required" placeholder="请输入还款周期" value="0">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">状态</label>
            <div class="layui-input-block">
                <input type="radio" name="status" value="1" title="启用" checked>
                <input type="radio" name="status" value="0" title="禁用">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">语言内容</label>
            <div class="layui-input-block">
                <div class="layui-tab layui-tab-card">
                    <ul class="layui-tab-title">
                        {foreach $lang_list as $key=>$val}
                        <li {if $val==sysconfig('base','base_lang')}class="layui-this"{/if}>{$val}</li>
                        {/foreach}
                    </ul>
                    <div class="layui-tab-content">
                        {foreach $lang_list as $key=>$val}
                        <div class="layui-tab-item {if $val==sysconfig('base','base_lang')}layui-show{/if}">
                            <div class="layui-form-item">
                                <label class="layui-form-label">产品标题</label>
                                <div class="layui-input-block">
                                    <input type="text" name="title[{$val}]" class="layui-input" placeholder="请输入标题" value="">
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <label class="layui-form-label">产品图片</label>
                                <div class="layui-input-block layuimini-upload">
                                    <input name="logo[{$val}]" class="layui-input layui-col-xs6" placeholder="请上传图片" value="">
                                    <div class="layuimini-upload-btn">
                                        <span><a class="layui-btn" data-upload="logo[{$val}]" data-upload-number="one" data-upload-exts="png|jpg|ico|jpeg" data-upload-icon="image"><i class="fa fa-upload"></i> 上传</a></span>
                                        <span><a class="layui-btn layui-btn-normal" id="select_logo_{$key}" data-upload-select="logo[{$val}]" data-upload-number="one" data-upload-mimetype="image/*"><i class="fa fa-list"></i> 选择</a></span>
                                    </div>
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <label class="layui-form-label">内容描述</label>
                                <div class="layui-input-block">
                                    <textarea name="content[{$val}]" rows="12" class="layui-textarea editor" placeholder="请输入内容描述"></textarea>
                                </div>
                            </div>
                            <div class="layui-form-item layui-form-text">
                                <label class="layui-form-label">备注说明</label>
                                <div class="layui-input-block">
                                    <textarea name="remark[{$val}]" class="layui-textarea" placeholder="请输入备注说明"></textarea>
                                </div>
                            </div>
                        </div>
                        {/foreach}
                    </div>
                </div>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">排序</label>
            <div class="layui-input-block">
                <input type="text" name="sort" class="layui-input" placeholder="请输入排序" value="0">
            </div>
        </div>

        <div class="hr-line"></div>
        <div class="layui-form-item text-center">
            <button type="submit" class="layui-btn layui-btn-normal layui-btn-sm" lay-submit>确认</button>
            <button type="reset" class="layui-btn layui-btn-primary layui-btn-sm">重置</button>
        </div>
    </form>
</div>
