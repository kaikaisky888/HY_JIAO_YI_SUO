<div class="layuimini-container">
    <form id="app-form" class="layui-form layuimini-form">

        <div class="layui-form-item">
            <label class="layui-form-label">申请ID</label>
            <div class="layui-input-block">
                <input type="text" class="layui-input" value="{$row.id}" disabled>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">用户</label>
            <div class="layui-input-block">
                <input type="text" class="layui-input" value="{$row.username|default=''} (UID: {$row.uid})" disabled>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">贷款产品</label>
            <div class="layui-input-block">
                <input type="text" class="layui-input" value="{$row.loan_name|default=''}" disabled>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">申请金额</label>
            <div class="layui-input-block">
                <input type="text" class="layui-input" value="{$row.amount}" disabled>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">年化利率</label>
            <div class="layui-input-block">
                <input type="text" class="layui-input" value="{$row.interest_rate}%" disabled>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">还款周期</label>
            <div class="layui-input-block">
                <input type="text" class="layui-input" value="{$row.repayment_period} 天" disabled>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">真实姓名</label>
            <div class="layui-input-block">
                <input type="text" class="layui-input" value="{$row.real_name}" disabled>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">手机号</label>
            <div class="layui-input-block">
                <input type="text" class="layui-input" value="{$row.phone}" disabled>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">证件号</label>
            <div class="layui-input-block">
                <input type="text" class="layui-input" value="{$row.id_number}" disabled>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">证件正面</label>
            <div class="layui-input-block">
                {if $row.id_card_front}
                <img src="{$row.id_card_front}" style="max-width: 240px;max-height: 140px;">
                {/if}
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">证件反面</label>
            <div class="layui-input-block">
                {if $row.id_card_back}
                <img src="{$row.id_card_back}" style="max-width: 240px;max-height: 140px;">
                {/if}
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">审核结果</label>
            <div class="layui-input-block">
                <input type="radio" name="status" value="1" title="审核通过" checked>
                <input type="radio" name="status" value="2" title="审核拒绝">
            </div>
        </div>

        <div class="layui-form-item layui-form-text">
            <label class="layui-form-label">审核备注</label>
            <div class="layui-input-block">
                <textarea name="review_remark" class="layui-textarea" placeholder="拒绝时请填写原因，通过时可选填"></textarea>
            </div>
        </div>

        <div class="hr-line"></div>
        <div class="layui-form-item text-center">
            <button type="submit" class="layui-btn layui-btn-normal layui-btn-sm" lay-submit>确认审核</button>
            <button type="reset" class="layui-btn layui-btn-primary layui-btn-sm">重置</button>
        </div>
    </form>
</div>
