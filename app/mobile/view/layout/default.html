<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{$web_name}</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <style>
        /* 适配 iPhone 刘海屏安全区域 */
        body { padding-top: env(safe-area-inset-top); padding-top: constant(safe-area-inset-top); }
        .header { padding-top: env(safe-area-inset-top); padding-top: constant(safe-area-inset-top); }
        /* 消除移动端300ms点击延迟 */
        a, button, input, select, textarea, .menuBtn, .layui-btn, [onclick] {
            touch-action: manipulation;
        }
        /* 适配 iPhone 底部安全区域 */
        .footer {
            padding-bottom: constant(safe-area-inset-bottom) !important;
            padding-bottom: env(safe-area-inset-bottom) !important;
        }
        .main {
            padding-bottom: calc(60px + constant(safe-area-inset-bottom));
            padding-bottom: calc(60px + env(safe-area-inset-bottom));
        }
    </style>
    {:token_meta()}
    <!--[if lt IE 9]>
    <script src="https://cdn.staticfile.org/html5shiv/r29/html5.min.js"></script>
    <script src="https://cdn.staticfile.org/respond.js/1.4.2/respond.min.js"></script>
    <![endif]-->
    <link rel="stylesheet" href="__STATIC__/mobile/layui/css/layui.css?v={$version}" media="all">
    <link rel="stylesheet" href="__STATIC__/mobile/css/style.css?v={$version}" media="all">
    <link rel="stylesheet" href="__STATIC__/mobile/css/mobile.css?v={$version}" media="all">
    <link rel="stylesheet" href="__STATIC__/mobile/lib/font-awesome-4.7.0/css/font-awesome.min.css?v={$version}" media="all">
    {if $theme=='Dark'}
    <link rel="stylesheet" href="__STATIC__/mobile/css/dark.css?v={$version}" media="all">
    {else}
    <link rel="stylesheet" href="__STATIC__/mobile/css/white.css?v={$version}" media="all">
    {/if}
    <script src="__STATIC__/mobile/js/jquery-3.4.1/jquery-3.4.1.min.js?v={$version}"></script>
    {if $langJs}
    <script src="{$langJs}?v={$version}" charset="utf-8"></script>
    {/if}
    <script src="__STATIC__/plugs/layui-v2.5.6/layui.js?v={$version}" charset="utf-8"></script>
    <script>
        var theme = "{$theme}";
        var langSec = "{:url('ajax/lang')}";
        var themeSec = "{:url('ajax/theme')}";
        var site_type = "{:sysconfig('site','site_type')}";
        var local_socket = "{:sysconfig('api','local_socket')}";
        var api_socket = "{:sysconfig('api','api_socket')}";
        var userWallet = "{:url('finance/userwallet')}";
    </script>
</head>
<body>
{__CONTENT__}
</body>
</html>
