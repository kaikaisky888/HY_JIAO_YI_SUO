server {
    listen ${LISTEN_PORT};
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;

    # ===== 静态资源 - 放行（探测用）=====
    location /static/ {
        expires 30d;
        access_log off;
    }

    location /favicon.ico { access_log off; }
    location /robots.txt { access_log off; }

    # ===== WebSocket =====
    location /wss {
        proxy_pass http://127.0.0.1:2348/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # ===== 主入口 - Nginx 门禁 =====
    location / {
        # 用 set 变量组合条件，避免多 if 互相覆盖
        set $gate "deny";

        if ($cookie__gate_pass = "1") {
            set $gate "allow";
        }

        if ($arg__gate) {
            set $gate "new";
        }

        # 有 _gate 参数 → 种 cookie 后 302 到干净 URL
        if ($gate = "new") {
            add_header Set-Cookie "_gate_pass=1; Path=/; Max-Age=86400; HttpOnly; SameSite=Lax";
            return 302 /;
        }

        # 没有 cookie 也没有 _gate 参数 → 505
        if ($gate = "deny") {
            return 505;
        }

        # 有 cookie → 放行，正常处理
        if (!-e $request_filename) {
            rewrite ^(.*)$ /index.php?s=/$1 last;
        }
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(ht|git|env) {
        deny all;
    }
}
