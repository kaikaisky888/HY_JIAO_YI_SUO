server {
    listen ${LISTEN_PORT};
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;

    # 关键：防止 redirect 带上内部端口(如 :8080)
    absolute_redirect off;

    # ===== 静态资源 - 放行（探测用）=====
    location /static/ {
        expires 30d;
        access_log off;
    }

    location /favicon.ico { access_log off; }
    location /robots.txt { access_log off; }

    # ===== WebSocket =====
    location /wss {
        proxy_pass http://127.0.0.1:2348/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # ===== gate 种 cookie（内部 location，外部无法直接访问）=====
    location = /_internal_gate {
        internal;
        add_header Set-Cookie "_gate_pass=1; Path=/; Max-Age=86400; HttpOnly; SameSite=Lax" always;
        return 302 /;
    }

    # ===== 主入口 - Nginx 门禁 =====
    location / {
        set $gate "deny";

        if ($cookie__gate_pass = "1") {
            set $gate "allow";
        }

        if ($arg__gate) {
            set $gate "new";
        }

        # 有 _gate 参数 → rewrite 到内部 location 种 cookie
        if ($gate = "new") {
            rewrite ^ /_internal_gate last;
        }

        # 没有 cookie 也没有 _gate 参数 → 505
        if ($gate = "deny") {
            return 505;
        }

        # 有 cookie → 放行，正常处理
        if (!-e $request_filename) {
            rewrite ^(.*)$ /index.php?s=/$1 last;
        }
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(ht|git|env) {
        deny all;
    }
}
