server {
    listen ${LISTEN_PORT};
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;

    # ===== 静态资源 - 放行（探测用）=====
    location /static/ {
        expires 30d;
        access_log off;
    }

    location /favicon.ico { access_log off; }
    location /robots.txt { access_log off; }

    # ===== WebSocket =====
    location /wss {
        proxy_pass http://127.0.0.1:2348/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # ===== gate 种 cookie 后重定向 =====
    location @set_gate_cookie {
        add_header Set-Cookie "_gate_pass=1; Path=/; Max-Age=86400; HttpOnly; SameSite=Lax" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        return 302 /;
    }

    # ===== 主入口 - Nginx 门禁 =====
    location / {
        # 有 _gate 参数 → 种 cookie 并重定向到干净 URL
        if ($arg__gate) {
            error_page 418 = @set_gate_cookie;
            return 418;
        }

        # 有 _gate_pass cookie → 放行
        # 没有 cookie → 505 拒绝
        if ($cookie__gate_pass != "1") {
            return 505;
        }

        if (!-e $request_filename) {
            rewrite ^(.*)$ /index.php?s=/$1 last;
        }
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(ht|git|env) {
        deny all;
    }
}
